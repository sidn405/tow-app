<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TowNow</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --green-dark: #0d3321;
            --green-mid: #155c3a;
            --green-brand: #16a34a;
            --green-bright: #22c55e;
            --green-light: #dcfce7;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--green-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 0%, rgba(34,197,94,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 100%, rgba(240,165,0,0.06) 0%, transparent 50%),
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
            pointer-events: none;
        }

        /* Floating tow truck shapes */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            background: rgba(34,197,94,0.04);
            border: 1px solid rgba(34,197,94,0.06);
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }
        .bg-shape:nth-child(2) { width: 400px; height: 400px; top: -100px; right: -100px; animation-delay: 0s; }
        .bg-shape:nth-child(3) { width: 250px; height: 250px; bottom: -60px; left: -60px; animation-delay: 3s; }
        .bg-shape:nth-child(4) { width: 150px; height: 150px; top: 40%; right: 10%; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.02); }
        }

        /* Card */
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(34,197,94,0.1);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Card header band */
        .card-band {
            background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
            padding: 32px 36px 28px;
            position: relative;
            overflow: hidden;
        }

        .card-band::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(255,255,255,0.02) 20px),
                        repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(255,255,255,0.02) 20px);
        }

        .card-band::after {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(34,197,94,0.2), transparent 70%);
        }

        .admin-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.25);
            border-radius: 6px;
            padding: 4px 10px;
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #86efac;
            margin-bottom: 14px;
        }

        .card-band h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 26px;
            color: white;
            letter-spacing: -0.02em;
            line-height: 1.1;
            position: relative;
            z-index: 1;
        }

        .card-band p {
            color: rgba(255,255,255,0.45);
            font-size: 13px;
            margin-top: 6px;
            position: relative;
            z-index: 1;
        }

        /* Form */
        .card-body { padding: 32px 36px; }

        .field-label {
            display: block;
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #374151;
            margin-bottom: 7px;
        }

        .field-label .req { color: var(--green-brand); margin-left: 2px; }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: #111827;
            background: #f9fafb;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--green-brand);
            background: white;
            box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
        }

        input.error {
            border-color: #ef4444;
            background: #fff5f5;
        }

        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 42px; }
        .pw-toggle {
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            cursor: pointer; color: #9ca3af;
            padding: 4px; line-height: 1;
            transition: color 0.15s;
        }
        .pw-toggle:hover { color: #374151; }

        .error-msg {
            font-size: 12px;
            color: #ef4444;
            margin-top: 5px;
            display: none;
        }
        .error-msg.show { display: block; }

        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--green-brand), #15803d);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(22,163,74,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(22,163,74,0.4);
        }

        .submit-btn:active { transform: translateY(0); }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Alert */
        .alert {
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .alert.show { display: flex; }
        .alert-error { background: #fee2e2; border: 1px solid #fecaca; color: #b91c1c; }
        .alert-success { background: #dcfce7; border: 1px solid #bbf7d0; color: #15803d; }

        /* Security note */
        .security-note {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 14px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            font-size: 12px;
            color: #15803d;
            font-weight: 500;
            margin-top: 20px;
        }

        /* Spinner */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .field-group { margin-bottom: 18px; }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- BG shapes -->
    <div class="bg-shape"></div>
    <div class="bg-shape"></div>
    <div class="bg-shape"></div>

    <div style="width:100%;max-width:420px;position:relative;z-index:1;">

        <!-- Logo above card -->
        <div style="text-align:center;margin-bottom:28px;animation:cardIn 0.4s ease;">
            <a href="index.html" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none;">
                <div style="width:44px;height:44px;background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(34,197,94,0.3);">
                    <svg width="22" height="22" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:white;letter-spacing:-0.02em;">TowNow</span>
            </a>
        </div>

        <!-- Card -->
        <div class="login-card">

            <!-- Header band -->
            <div class="card-band">
                <div class="admin-tag">
                    <svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                    Admin Access Only
                </div>
                <h1>Admin Console</h1>
                <p>Sign in with your administrator credentials</p>
            </div>

            <!-- Form body -->
            <div class="card-body">

                <!-- Error alert -->
                <div class="alert alert-error" id="error-alert">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 19h20L12 2zm0 3.5L19.5 18H4.5L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/></svg>
                    <span id="error-msg">Invalid credentials</span>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">

                    <div class="field-group">
                        <label class="field-label" for="email">Email Address <span class="req">*</span></label>
                        <input type="email" id="email" placeholder="admin@townow.com" autocomplete="email" required>
                        <div class="error-msg" id="err-email">Please enter a valid email.</div>
                    </div>

                    <div class="field-group">
                        <label class="field-label" for="password">Password <span class="req">*</span></label>
                        <div class="pw-wrap">
                            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                            <button type="button" class="pw-toggle" onclick="togglePw(this)" title="Show/hide password">
                                <svg id="eye-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <div class="error-msg" id="err-password">Please enter your password.</div>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <div class="spinner" id="spinner"></div>
                        <span id="btn-text">Sign In to Admin Console</span>
                        <svg id="btn-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </button>

                </form>

                <div class="security-note">
                    <svg width="14" height="14" fill="#15803d" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                    Secured with 256-bit encryption. Unauthorized access is prohibited.
                </div>

            </div>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <a href="index.html" style="color:rgba(255,255,255,0.35);font-size:13px;text-decoration:none;transition:color 0.15s;" onmouseover="this.style.color='rgba(255,255,255,0.7)'" onmouseout="this.style.color='rgba(255,255,255,0.35)'">← Back to TowNow</a>
        </div>

    </div>

    <script>
        // Redirect if already logged in
        const existingToken = localStorage.getItem('auth_token');
        if (existingToken) {
            verifyAdminToken(existingToken);
        }

        async function verifyAdminToken(token) {
            try {
                const res = await fetch('/api/v1/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const user = await res.json();
                    if (user.role === 'ADMIN' || user.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    }
                }
            } catch (e) {}
        }

        async function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Clear errors
            document.getElementById('error-alert').classList.remove('show');
            document.getElementById('err-email').classList.remove('show');
            document.getElementById('err-password').classList.remove('show');
            document.getElementById('email').classList.remove('error');
            document.getElementById('password').classList.remove('error');

            // Validate
            let valid = true;
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('err-email').classList.add('show');
                document.getElementById('email').classList.add('error');
                valid = false;
            }
            if (!password) {
                document.getElementById('err-password').classList.add('show');
                document.getElementById('password').classList.add('error');
                valid = false;
            }
            if (!valid) return;

            // Loading state
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('btn-text').textContent = 'Signing in...';
            document.getElementById('btn-arrow').style.display = 'none';

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.detail || 'Invalid email or password.');
                    return;
                }

                // Check admin role
                if (data.user?.role !== 'ADMIN' && data.user?.role !== 'admin') {
                    // Try fetching /me to check role
                    const meRes = await fetch('/api/v1/auth/me', {
                        headers: { 'Authorization': `Bearer ${data.access_token}` }
                    });
                    const me = await meRes.json();

                    if (me.role !== 'ADMIN' && me.role !== 'admin') {
                        showError('Access denied. This portal is for administrators only.');
                        return;
                    }
                }

                // Store tokens
                localStorage.setItem('auth_token', data.access_token);
                if (data.refresh_token) {
                    localStorage.setItem('refresh_token', data.refresh_token);
                }

                // Success — brief visual feedback then redirect
                document.getElementById('btn-text').textContent = 'Access granted ✓';
                document.getElementById('spinner').style.display = 'none';
                btn.style.background = 'linear-gradient(135deg, #15803d, #166534)';

                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 600);

            } catch (err) {
                showError('Network error. Please check your connection.');
            } finally {
                if (btn.disabled && document.getElementById('btn-text').textContent !== 'Access granted ✓') {
                    resetBtn();
                }
            }
        }

        function showError(msg) {
            document.getElementById('error-msg').textContent = msg;
            document.getElementById('error-alert').classList.add('show');
            resetBtn();
            // Shake the card
            const card = document.querySelector('.login-card');
            card.style.animation = 'none';
            card.style.transform = 'translateX(-6px)';
            setTimeout(() => { card.style.transform = 'translateX(6px)'; }, 80);
            setTimeout(() => { card.style.transform = 'translateX(-4px)'; }, 160);
            setTimeout(() => { card.style.transform = 'translateX(0)'; card.style.transition = 'transform 0.15s'; }, 240);
        }

        function resetBtn() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = false;
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('btn-text').textContent = 'Sign In to Admin Console';
            document.getElementById('btn-arrow').style.display = 'block';
        }

        function togglePw(btn) {
            const input = document.getElementById('password');
            const showing = input.type === 'text';
            input.type = showing ? 'password' : 'text';
            btn.innerHTML = showing
                ? `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
                : `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
        }

        // Focus email on load
        document.getElementById('email').focus();
    </script>
</body>
</html>
