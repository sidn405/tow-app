<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration - TowNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-12">
        <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Create Account</h1>
                <p class="text-gray-600">Join TowNow and get roadside assistance</p>
            </div>

            <form id="registerForm" class="space-y-6">
                <!-- Personal Info -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                    <input type="text" id="name" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
                    <input type="tel" id="phone" required placeholder="(555) 123-4567"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" required minlength="8"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <p class="text-xs text-gray-500 mt-1">Minimum 8 characters</p>
                </div>

                <!-- Payment Section -->
                <div class="border-t pt-6 mt-6">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">💳 Payment Information</h2>
                    <p class="text-sm text-gray-600 mb-4">Your card will be charged when you request a tow. No charges today.</p>
                    
                    <div id="card-element" class="p-4 border border-gray-300 rounded-lg bg-gray-50"></div>
                    <div id="card-errors" class="text-red-500 text-sm mt-2"></div>
                </div>

                <!-- Submit -->
                <button type="submit" id="submitBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-200 disabled:bg-gray-400 disabled:cursor-not-allowed">
                    Create Account & Add Payment
                </button>

                <p class="text-center text-sm text-gray-600">
                    Already have an account? 
                    <a href="/index.html" class="text-blue-600 hover:underline">Sign In</a>
                </p>
            </form>

            <div id="successMessage" class="hidden mt-6 p-4 bg-green-50 border border-green-200 rounded-lg">
                <p class="text-green-800 font-medium">✅ Account created successfully!</p>
                <p class="text-green-700 text-sm mt-1">Redirecting to dashboard...</p>
            </div>

            <div id="errorMessage" class="hidden mt-6 p-4 bg-red-50 border border-red-200 rounded-lg">
                <p class="text-red-800 font-medium" id="errorText"></p>
            </div>
        </div>
    </div>

    <script>
        // Initialize Stripe
        const stripe = Stripe('YOUR_STRIPE_PUBLISHABLE_KEY'); // Will be fetched from backend
        let stripePublicKey = null;
        let elements = null;
        let cardElement = null;

        // Fetch Stripe public key from backend
        async function initializeStripe() {
            try {
                const response = await fetch('/api/v1/config/stripe-key');
                const data = await response.json();
                stripePublicKey = data.publishable_key;
                
                // Initialize Stripe with the key
                const stripeInstance = Stripe(stripePublicKey);
                elements = stripeInstance.elements();
                
                // Create card element
                cardElement = elements.create('card', {
                    style: {
                        base: {
                            fontSize: '16px',
                            color: '#32325d',
                            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
                            '::placeholder': {
                                color: '#aab7c4'
                            }
                        },
                        invalid: {
                            color: '#fa755a',
                            iconColor: '#fa755a'
                        }
                    }
                });
                
                cardElement.mount('#card-element');
                
                // Handle card errors
                cardElement.on('change', (event) => {
                    const displayError = document.getElementById('card-errors');
                    if (event.error) {
                        displayError.textContent = event.error.message;
                    } else {
                        displayError.textContent = '';
                    }
                });
                
                return stripeInstance;
            } catch (error) {
                console.error('Error initializing Stripe:', error);
                showError('Failed to load payment form. Please refresh the page.');
            }
        }

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';

            try {
                // Step 1: Create payment method with Stripe
                const stripeInstance = await initializeStripe();
                const {error, paymentMethod} = await stripeInstance.createPaymentMethod({
                    type: 'card',
                    card: cardElement,
                    billing_details: {
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                    }
                });

                if (error) {
                    throw new Error(error.message);
                }

                // Step 2: Register user with payment method ID
                const registerData = {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    password: document.getElementById('password').value,
                    role: 'customer',
                    payment_method_id: paymentMethod.id
                };

                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(registerData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Registration failed');
                }

                // Success!
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('successMessage').classList.remove('hidden');

                // Store token and redirect
                localStorage.setItem('token', data.access_token);
                setTimeout(() => {
                    window.location.href = '/customer-dashboard.html';
                }, 2000);

            } catch (error) {
                showError(error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account & Add Payment';
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 5000);
        }

        // Initialize Stripe on page load
        initializeStripe();
    </script>
</body>
</html>
